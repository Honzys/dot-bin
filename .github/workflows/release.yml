name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Extract version from CHANGELOG
        id: version
        run: |
          VERSION=$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | head -1)
          if [[ -z "$VERSION" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version found in CHANGELOG.md, skipping release"
            exit 0
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Check if release already exists
        if: steps.version.outputs.skip == 'false'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.tag }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all binaries
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOT_BIN_DIR: /tmp/staging/bin
        run: |
          mkdir -p /tmp/staging/bin
          cp versions.json /tmp/versions-current.json
          echo '{}' > versions.json
          ./scripts/update.sh
          cp /tmp/versions-current.json versions.json

      - name: Create release tarballs
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          mkdir -p /tmp/release
          for arch in x86_64 arm64; do
            if [[ -d "/tmp/staging/bin/${arch}" ]] && ls "/tmp/staging/bin/${arch}/"* > /dev/null 2>&1; then
              tar -czf "/tmp/release/dot-bin-${arch}.tar.gz" -C "/tmp/staging/bin/${arch}" .
              echo "Created dot-bin-${arch}.tar.gz"
            fi
          done

      - name: Generate checksums
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          cd /tmp/release
          sha256sum dot-bin-*.tar.gz > checksums.sha256
          cp "$GITHUB_WORKSPACE/versions.json" versions.json
          cat checksums.sha256

      - name: Generate release notes
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract CHANGELOG section for this version
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            /^## \[/ { if(found) exit }
            found { print }
          ' CHANGELOG.md > /tmp/release/notes.md

          # Append packages table
          python3 -c "
          import json
          with open('versions.json') as f:
              versions = json.load(f)
          print()
          print('## All packages')
          print()
          print('| Package | Version |')
          print('|---------|---------|')
          for k in sorted(versions):
              print(f'| {k} | {versions[k]} |')
          " >> /tmp/release/notes.md

      - name: Create GitHub Release
        if: steps.version.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            /tmp/release/dot-bin-*.tar.gz \
            /tmp/release/checksums.sha256 \
            /tmp/release/versions.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release/notes.md
