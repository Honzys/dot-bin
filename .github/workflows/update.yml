name: Update packages

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package names (empty = all)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Save current versions
        run: cp versions.json /tmp/versions-old.json

      - name: Run update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOT_BIN_DIR: /tmp/staging/bin
        run: |
          mkdir -p /tmp/staging/bin
          if [[ -n "${{ inputs.packages }}" ]]; then
            ./scripts/update.sh ${{ inputs.packages }}
          else
            ./scripts/update.sh
          fi

      - name: Check for changes
        id: diff
        run: |
          if diff -q /tmp/versions-old.json versions.json > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No package changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump CHANGELOG
        if: steps.diff.outputs.changed == 'true'
        id: bump
        run: |
          VERSION=$(python3 scripts/bump-changelog.py /tmp/versions-old.json versions.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${VERSION}"

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="chore/update-packages"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add versions.json CHANGELOG.md
          git commit -m "chore: update packages to v${VERSION}"
          git push -u origin "$BRANCH" --force

          # Create PR if one doesn't already exist
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            echo "Updated existing PR #${EXISTING}"
          else
            gh pr create \
              --title "chore: update packages to v${VERSION}" \
              --body "$(cat <<EOF
          ## Summary
          Automated package update to v${VERSION}. See CHANGELOG.md for details.
          EOF
          )" \
              --base master
          fi
